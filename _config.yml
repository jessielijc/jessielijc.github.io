first_name: Jiacan
middle_name: ""
last_name: Li
email: jessielijc@outlook.com
github_username: jessielijc 
description: "B.Eng. in Robotics Engineering @ SUSTech"

# 核心路径：确保样式能加载
url: https://jessielijc.github.io
baseurl: ""

# -----------------------------------------------------------------------------
# 插件设置（移除了报错的 jekyll-3rd-party-libraries）
# -----------------------------------------------------------------------------
plugins:
  - jekyll-archives-v2
  - jekyll-feed
  - jekyll-sitemap
  - jemoji
  - jekyll-link-attributes

# -----------------------------------------------------------------------------
# 显示与布局设置
# -----------------------------------------------------------------------------
navbar_fixed: true
footer_fixed: true
max_width: 930px
enable_darkmode: true

# -----------------------------------------------------------------------------
# Jekyll 编译设置
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
include: ["_pages", "_scripts"]
exclude:
  - bin/
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - LICENSE
sass:
  style: compressed
